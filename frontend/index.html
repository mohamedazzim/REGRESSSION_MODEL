<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Automobile Dashboard — Laptop Price Predictor</title>
    <link rel="stylesheet" href="/frontend/assets/css/style.css">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">AutoTech Models</div>
        <nav class="nav">
          <a href="#">Dashboard</a>
          <a href="#predict">Predict</a>
        </nav>
      </header>

      <main class="main">
        <section class="hero">
          <h1>Laptop Price Predictor</h1>
          <p class="lead">Fast, explainable price estimates — automotive-inspired dashboard theme.</p>
        </section>

        <section id="predict" class="card">
          <h2>Predict Price</h2>
          <form id="predict-form">
            <div class="row">
              <label>RAM (GB)</label>
              <input name="ram_gb" type="number" min="0" value="8" />
            </div>
            <div class="row">
              <label>Display size (inches)</label>
              <input name="display_size" type="number" step="0.1" value="15.6" />
            </div>
            <div class="row">
              <label>Resolution width</label>
              <input name="resolution_width" type="number" value="1920" />
            </div>
            <div class="row">
              <label>Resolution height</label>
              <input name="resolution_height" type="number" value="1080" />
            </div>
            <div class="row">
              <label>SSD size (GB)</label>
              <input name="ssd_size_gb" type="number" value="256" />
            </div>
            <div class="row">
              <label>GPU memory (GB)</label>
              <input name="gpu_memory_gb" type="number" value="2" />
            </div>

            <div class="actions">
              <button type="submit" class="btn primary">Get Estimate</button>
            </div>
          </form>

          <div id="result" class="result card-muted" aria-live="polite"></div>
        </section>
      </main>

      <footer class="footer">© AutoTech Models</footer>
    </div>
    <script src="/frontend/assets/js/app.js"></script>
  </body>
</html>
